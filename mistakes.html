    const quizData = [
        {

            question: "Choose the correct one: \"<ruby>従業員<rt>じゅうぎょういん</rt></ruby>（jugyouin / Employee）が___。\"",
            options: ["あります", "います"],
            answer: 1,
            explanation: "Use \"います (imasu)\" for living things like people and animals. Use \"あります (arimasu)\" for inanimate objects or plants.",
            reviewLink: "../index.html?step=step11"

        {

            answer: 1,
            explanation: "To make an i-adjective past tense, change the final \"i\" to \"katta\". \"Oishii deshita\" is a common mistake!",
            reviewLink: "../index.html?step=step07"
        },
        {
            topic: "Desu vs Masu",
            question: "\"I study Japanese every day.\": <ruby>毎日<rt>まいにち</rt></ruby>、<ruby>日本語<rt>にほんご</rt></ruby>を<ruby>勉強<rt>べんきょう</rt></ruby>___。",
            options: ["です", "します/ます"],
            answer: 1,
            explanation: "\"Desu\" follows nouns or adjectives. \"Masu\" follows verbs. \"Benkyou shimashita\" or \"Benkyou shimasu\" uses the verb form.",
            reviewLink: "../index.html?step=step03"
        },
        {
            topic: "Wear Verbs (Kiru, Kaburu, etc.)",

        {

            options: ["さむい", "つめたい"],
            answer: 1,
            explanation: "Use \"さむい (samui)\" for cold weather/air. Use \"つめたい (tsumetai)\" for cold objects or drinks.",
            reviewLink: "../index.html?step=step06"
        },
        {
            topic: "Kowai vs Kawaii",
            question: "That dog is scary: あの<ruby>犬<rt>いぬ</rt></ruby>は___です。",
            options: ["かわいい", "こわい"],
            answer: 1,
            explanation: "Kowai means Scary. Kawaii means Cute. Their pronunciations are similar, so be careful!",
            reviewLink: "../index.html?step=step06"
        },
        {
            topic: "Furui vs Otoshiyori (Old)",
            question: "That person is old (Elderly): あの<ruby>方<rt>かた</rt></ruby>は___です。",
            options: ["<ruby>古<rt>ふる</rt></ruby>い", "お<ruby>年寄<rt>としよ</rt></ruby>り"],
            answer: 1,
            explanation: "Use \"ふるい (furui)\" for old objects. For people, use \"お年寄り (otoshiyori)\" or \"歳（とし）をとっている\". Calling a person \"furui\" is rude!",
            reviewLink: "../index.html?step=step08"
        }
    ];

    function renderQuizzes() {
        const container = document.getElementById('quiz-container');
        quizData.forEach((data, index) => {
            const card = document.createElement('div');
            card.className = 'quiz-card';
            card.innerHTML = `
                <span class="question-num">Point ${index + 1}: ${data.topic}</span>
                <div class="question-text">${data.question}</div>
                <div class="options-grid">
                    ${data.options.map((opt, i) => `
                        <button class="option-btn" onclick="checkAnswer(${index}, ${i}, this)">
                            ${opt}
                        </button>
                    `).join('')}
                </div>
                <div class="feedback" id="feedback-${index}">
                    <p class="explanation"></p>
                    <a href="${data.reviewLink}" class="review-link">📖 Review Lesson →</a>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function checkAnswer(quizIdx, optionIdx, btn) {
        const data = quizData[quizIdx];
        const feedback = document.getElementById(`feedback-${quizIdx}`);
        const buttons = btn.parentElement.querySelectorAll('.option-btn');
        
        buttons.forEach(b => b.style.pointerEvents = 'none');

        if (optionIdx === data.answer) {
            btn.classList.add('correct');
            feedback.classList.add('correct');
            feedback.querySelector('.explanation').innerText = "✨ Correct! " + data.explanation;
        } else {
            btn.classList.add('wrong');
            feedback.classList.add('wrong');
            feedback.querySelector('.explanation').innerText = "❌ Oops! " + data.explanation;
            buttons[data.answer].classList.add('correct');
        }
    }

    renderQuizzes();
</script>

</body>
</html>
